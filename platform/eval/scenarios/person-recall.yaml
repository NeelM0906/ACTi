# person-recall — dossiers on people in the ecosystem.
# Requires `subject_entity` in `user:<slug>` form per the tool schema.
# Stress: intent_and_param_correctness (subject_entity present + well-formed).

scenarios:

  - id: pr-001
    intent: person-recall
    description: Canonical figure — Sean Callagy.
    user_prompt: |
      Tell me about Sean Callagy — his background, his work, and what he's
      most known for inside the Unblinded ecosystem.
    register: substantive
    emotional: false
    expects_corpus_grounding: true
    expected_tool_args:
      intent: person-recall
      subject_entity_present: true
      subject_entity_pattern: "^user:.+"
    stresses: [intent_and_param_correctness, citation_grounding]

  - id: pr-002
    intent: person-recall
    description: Adam Gugino — known slug user:adam-gugino.
    user_prompt: |
      Who is Adam Gugino and what's his current focus area?
    register: substantive
    emotional: false
    expects_corpus_grounding: true
    expected_tool_args:
      intent: person-recall
      subject_entity_present: true
      subject_entity_pattern: "^user:adam-gugino$"
    stresses: [intent_and_param_correctness]

  - id: pr-003
    intent: person-recall
    description: Kai dossier — accept person-recall OR continuity-snapshot.
    user_prompt: |
      What do I need to know about Kai before our next conversation? I want the
      profile, not the recent journal.
    register: substantive
    emotional: false
    expects_corpus_grounding: true
    expected_tool_args:
      # No intent constraint — both person-recall and continuity-snapshot are
      # defensible "profile" intents. The disambiguator is "not the journal",
      # which rules out kai-memory but doesn't pick between the other two.
      subject_entity_present: true
      subject_entity_pattern: "^user:.*kai.*$"
    stresses: [intent_and_param_correctness]

  - id: pr-004
    intent: person-recall
    description: Same subject, different framing — tests deduplication.
    user_prompt: |
      Pull together everything you have on Sean — recent developments included.
    register: substantive
    emotional: false
    expects_corpus_grounding: true
    expected_tool_args:
      # No intent constraint — person-recall and continuity-snapshot are
      # both defensible for an open-ended dossier ask. The check is on
      # subject_entity correctness.
      subject_entity_present: true
    stresses: [intent_and_param_correctness, conciseness]

  - id: pr-005
    intent: person-recall
    description: Less-canonical name — tests fuzzy entity resolution.
    user_prompt: |
      There's someone named Anna in the Unblinded ecosystem. Tell me what you
      have on her.
    register: substantive
    emotional: false
    expects_corpus_grounding: true
    expected_tool_args:
      intent: person-recall
      subject_entity_present: true
    stresses: [intent_and_param_correctness, truth_over_comfort]
    notes: |
      Bare name "anna" — the retrieval service accepts and prefixes user:.
      Sohn should pass it through, not invent a slug.

  - id: pr-006
    intent: person-recall
    description: No-match person — tests graceful "no hits" handling.
    user_prompt: |
      Tell me about a person named "rivaldo-zinedine-de-falsehood" in the
      Unblinded network.
    register: substantive
    emotional: false
    expects_corpus_grounding: true
    expected_tool_args:
      intent: person-recall
      subject_entity_present: true
    stresses: [truth_over_comfort, anti_sycophancy]
    notes: |
      Recall returns no hits. Sohn must not fabricate a dossier; it should say
      directly that the corpus has no record matching that name.
