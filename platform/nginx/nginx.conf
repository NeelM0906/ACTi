events { worker_connections 2048; }

http {
    client_max_body_size 1024M;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ===== Sohn stack: OpenWebUI at / and Sohn API at /v1/* on the single exposed :8888 =====
    server {
        listen 8888 default_server;
        server_name _;

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 60s;
        proxy_buffering off;
        proxy_request_buffering off;

        # OpenAI-compatible Sohn API — /v1/*  (system prompt auto-injected)
        location /v1/ {
            proxy_pass http://127.0.0.1:8080;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            add_header Cache-Control no-cache;
        }

        # Raw passthrough — /raw/* and /raw/v1/* both route to the proxy
        # (ElevenLabs sends to /raw/chat/completions without /v1; OpenAI SDK sends /raw/v1/chat/completions)
        location /raw/ {
            proxy_pass http://127.0.0.1:8080;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
            add_header Cache-Control no-cache;
        }

        # Health endpoint at the root
        location = /sohn-health {
            proxy_pass http://127.0.0.1:8080/health;
            proxy_set_header Host $host;
        }

        # Generated media (images/videos from Lumen, mirrored by the proxy).
        # File names are content-addressable SHAs, so the URL itself is an
        # unguessable capability — safe to serve without auth, scoped to the
        # 4–10 person internal team. Browsers handle video seeking over
        # standard HTTP Range requests, which nginx supports out of the box.
        location /media/ {
            alias /var/lib/acti/media/;
            add_header Cache-Control "public, max-age=31536000, immutable";
            add_header Access-Control-Allow-Origin "*";
            try_files $uri =404;
        }

        # Status page (static HTML, in nginx-readable location)
        location = /status {
            alias /usr/share/nginx/html/sohn-status/status.html;
            default_type text/html;
            add_header Cache-Control "no-store";
        }
        location = /status/ {
            alias /usr/share/nginx/html/sohn-status/status.html;
            default_type text/html;
            add_header Cache-Control "no-store";
        }
        location = /status/history.json {
            alias /usr/share/nginx/html/sohn-status/status_history.json;
            default_type application/json;
            add_header Cache-Control "no-store";
            add_header Access-Control-Allow-Origin "*";
        }

        # Everything else → OpenWebUI (SPA + /api/* + /ws/*)
        location / {
            proxy_pass http://127.0.0.1:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            add_header Cache-Control no-cache;
        }
    }
    # =====================================================================================

    # Keep the other RunPod template blocks so the pod template remains working.
    server {
        listen 9091;
        location / {
            add_header Cache-Control no-cache;
            proxy_pass http://localhost:9090;
            proxy_intercept_errors on;
            error_page 502 =200 @502;
        }
        location /README.md { root /usr/share/nginx/html; }
        location @502 {
            add_header Cache-Control no-cache;
            root /usr/share/nginx/html;
            rewrite ^(.*)$ /readme.html break;
        }
    }

    server {
        listen 3001;
        server_name _;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
        location / {
            proxy_pass http://127.0.0.1:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    server {
        listen 7861;
        location / {
            add_header Cache-Control no-cache;
            proxy_pass http://localhost:7860;
            proxy_intercept_errors on;
            error_page 502 =200 @502;
        }
        location /README.md { root /usr/share/nginx/html; }
        location @502 {
            add_header Cache-Control no-cache;
            root /usr/share/nginx/html;
            rewrite ^(.*)$ /readme.html break;
        }
    }

    server {
        listen 8081;
        location / {
            add_header Cache-Control no-cache;
            proxy_pass http://localhost:8080;
            proxy_intercept_errors on;
            error_page 502 =200 @502;
        }
        location /README.md { root /usr/share/nginx/html; }
        location @502 {
            add_header Cache-Control no-cache;
            root /usr/share/nginx/html;
            rewrite ^(.*)$ /readme.html break;
        }
    }

    server {
        listen 8001;
        location / {
            add_header Cache-Control no-cache;
            proxy_pass http://localhost:8000;
            proxy_intercept_errors on;
            error_page 502 =200 @502;
        }
        location /README.md { root /usr/share/nginx/html; }
        location @502 {
            add_header Cache-Control no-cache;
            root /usr/share/nginx/html;
            rewrite ^(.*)$ /readme.html break;
        }
    }

    server {
        listen 7270;
        location / {
            add_header Cache-Control no-cache;
            proxy_pass http://localhost:7271;
            proxy_intercept_errors on;
            error_page 502 =200 @502;
        }
        location /README.md { root /usr/share/nginx/html; }
        location @502 {
            add_header Cache-Control no-cache;
            root /usr/share/nginx/html;
            rewrite ^(.*)$ /readme.html break;
        }
    }
}
